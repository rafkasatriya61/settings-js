            if (!file) return null;
            const form = new FormData();
            form.append('files', file);
            try {
                const r = await fetch('https://cdn.yupra.my.id/upload', { method: 'POST', body: form });
                const j = await r.json(); return `https://cdn.yupra.my.id${j.files[0].url}`;
            } catch {
                const c = new FormData(); c.append('reqtype', 'fileupload'); c.append('fileToUpload', file);
                const cr = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: c });
                return await cr.text();
            }
        }

async function resize(url, width, height, referer = null) {
  try {
    const fetchOptions = {
      redirect: 'follow',
      headers: {},
    };

    if (referer) {
      fetchOptions.headers['Referer'] = referer;
    }

    const response = await fetch(url, fetchOptions);

    if (response.ok) {
      const finalUrl = response.url;
      const arrayBuffer = await response.arrayBuffer();
      return await Jimp.read(Buffer.from(arrayBuffer)).then(image => image.resize(width, height).getBufferAsync(Jimp.MIME_JPEG));
    } else {
      throw new Error(\`HTTP error! Status: \${response.status}\`);
    }
  } catch (error) {
    console.error('Error:', error.message);

    try {
      const undiciFetchOptions = {
        redirect: 'follow',
        headers: {},
      };

      if (referer) {
        undiciFetchOptions.headers['Referer'] = referer;
        }

     const arrayBuffer = await fetch(url, undiciFetchOptions)
  .then(response => response.arrayBuffer());
      return await Jimp.read(Buffer.from(arrayBuffer)).then(image => image.resize(width, height).getBufferAsync(Jimp.MIME_JPEG));
    } catch (retryError) {
      console.error('Retry Error:', retryError.message);
      return Buffer.from([]);
    }
  }
}
